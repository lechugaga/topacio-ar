<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>El Topacio - Realidad Aumentada</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
    #indicador {
      position: absolute;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: rgba(18, 38, 25, 0.85);
      color: #ffffff;
      padding: 12px 24px;
      border-radius: 30px;
      font-family: 'Georgia', serif;
      font-size: 14px;
      letter-spacing: 0.5px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      pointer-events: none;
      text-align: center;
    }
  </style>
</head>
<body>

  <div id="indicador">🌿 Apunta la cámara a cualquiera de las páginas de la revista</div>

  <a-scene 
    mindar-image="imageTargetSrc: ./targets.mind;" 
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <!-- PÁGINA 1 -->
      <img id="imgColibri" src="./colibri.png">
      <img id="imgOrquidea" src="./orquidea.png">
      <img id="imgPajaro2" src="./pajaro2.png">

      <!-- PÁGINA 2 -->
      <img id="imgGallito" src="./gallito.png">
      <img id="imgPajaro4" src="./pajaro4.png">
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- ==========================================
         PÁGINA 2 (En tu targets.mind es el índice 0)
         ========================================== -->
    <a-entity mindar-image-target="targetIndex: 0">

      <!-- GALLITO DE ROCA (Con movimiento de respiración e inclinación) -->
      <a-plane 
        src="#imgGallito" 
        position="-0.38 -0.28 0.01" 
        height="0.4" 
        width="0.35" 
        material="alphaTest: 0.5; transparent: true"
        animation__respirar="property: scale; to: 1.07 1.07 1; dir: alternate; dur: 1400; loop: true; easing: easeInOutSine"
        animation__inclinacion="property: rotation; to: 0 0 -4; dir: alternate; dur: 2200; loop: true; easing: easeInOutQuad">
      </a-plane>

      <!-- COLIBRÍ RUBÍ TOPACIO -->
      <a-plane 
        src="#imgPajaro4" 
        position="0.38 0.20 0.02" 
        height="0.35" 
        width="0.4" 
        material="alphaTest: 0.5; transparent: true"
        animation__flotar="property: position; to: 0.38 0.23 0.03; dir: alternate; dur: 800; loop: true; easing: easeInOutQuad">
      </a-plane>

    </a-entity>


    <!-- ==========================================
         PÁGINA 1 (En tu targets.mind es el índice 1)
         ========================================== -->
    <a-entity mindar-image-target="targetIndex: 1">

      <!-- ORQUÍDEA -->
      <a-plane 
        src="#imgOrquidea" 
        position="-0.65 -0.38 0.01" 
        height="0.4" 
        width="0.5" 
        material="alphaTest: 0.5; transparent: true"
        animation="property: scale; to: 1.03 1.03 1; dir: alternate; dur: 2200; loop: true; easing: easeInOutSine">
      </a-plane>

      <!-- COLIBRÍ -->
      <a-plane 
        src="#imgColibri" 
        position="-0.35 -0.15 0.02" 
        height="0.25" 
        width="0.35" 
        material="alphaTest: 0.5; transparent: true"
        animation__flotar="property: position; to: -0.35 -0.13 0.03; dir: alternate; dur: 800; loop: true; easing: easeInOutQuad">
      </a-plane>

      <!-- PAJARITO CAFÉ -->
      <a-plane 
        src="#imgPajaro2" 
        position="0.32 -0.35 0.01" 
        height="0.35" 
        width="0.35" 
        material="alphaTest: 0.5; transparent: true"
        animation__respirar="property: scale; to: 1.03 1.03 1; dir: alternate; dur: 1500; loop: true; easing: easeInOutSine">
      </a-plane>

    </a-entity>

  </a-scene>

</body>
</html>
