<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>El Topacio - WebAR con p5.js</title>

  <!-- 1. CARGA DE LIBRERÍAS (A-Frame, MindAR y p5.js) -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    /* Mantiene el canvas de p5 invisible fuera de pantalla */
    #p5Canvas { display: none; }
    #indicador {
      position: absolute;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: rgba(18, 38, 25, 0.85);
      color: #ffffff;
      padding: 12px 24px;
      border-radius: 30px;
      font-family: 'Georgia', serif;
      font-size: 14px;
      letter-spacing: 0.5px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      pointer-events: none;
      text-align: center;
    }
  </style>

  <script>
    // Componente para refrescar la animación de p5.js en Realidad Aumentada
    AFRAME.registerComponent('p5-texture', {
      tick: function () {
        let mesh = this.el.getObject3D('mesh');
        if (mesh && mesh.material && mesh.material.map) {
          mesh.material.map.needsUpdate = true;
        }
      }
    });
  </script>
</head>
<body>

  <div id="indicador">🌿 Apunta la cámara a cualquiera de las páginas de la revista</div>

  <a-scene 
    mindar-image="imageTargetSrc: ./targets.mind;" 
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <!-- TUS IMÁGENES RE CORTADAS -->
      <img id="imgColibri" src="./colibri.png">
      <img id="imgOrquidea" src="./orquidea.png">
      <img id="imgPajaro2" src="./pajaro2.png">
      <img id="imgGallito" src="./gallito.png">
      <img id="imgPajaro4" src="./pajaro4.png">
      
      <!-- LIENZO DE P5.JS -->
      <canvas id="p5Canvas"></canvas>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- ================= PÁGINA 2 (targetIndex: 0) ================= -->
    <a-entity mindar-image-target="targetIndex: 0">
      <a-plane 
        src="#imgGallito" 
        position="-0.38 -0.28 0.01" 
        height="0.4" width="0.35" 
        material="alphaTest: 0.5; transparent: true"
        animation__respirar="property: scale; to: 1.07 1.07 1; dir: alternate; dur: 1400; loop: true; easing: easeInOutSine"
        animation__inclinacion="property: rotation; to: 0 0 -4; dir: alternate; dur: 2200; loop: true; easing: easeInOutQuad">
      </a-plane>

      <a-plane 
        src="#imgPajaro4" 
        position="0.38 0.20 0.02" 
        height="0.35" width="0.4" 
        material="alphaTest: 0.5; transparent: true"
        animation__flotar="property: position; to: 0.38 0.23 0.03; dir: alternate; dur: 800; loop: true; easing: easeInOutQuad">
      </a-plane>
    </a-entity>

    <!-- ================= PÁGINA 1 (targetIndex: 1) ================= -->
    <a-entity mindar-image-target="targetIndex: 1">

      <!-- EFECTO P5.JS: Partículas de polvo/polen mágico sobre la página -->
      <a-plane 
        src="#p5Canvas" 
        position="0 0 0.03" 
        height="0.9" width="1.3" 
        p5-texture
        material="transparent: true; alphaTest: 0.1">
      </a-plane>

      <!-- TUS TRES IMÁGENES ANIMADAS -->
      <a-plane 
        src="#imgOrquidea" 
        position="-0.65 -0.38 0.01" 
        height="0.4" width="0.5" 
        material="alphaTest: 0.5; transparent: true"
        animation="property: scale; to: 1.03 1.03 1; dir: alternate; dur: 2200; loop: true; easing: easeInOutSine">
      </a-plane>

      <a-plane 
        src="#imgColibri" 
        position="-0.35 -0.15 0.02" 
        height="0.25" width="0.35" 
        material="alphaTest: 0.5; transparent: true"
        animation__flotar="property: position; to: -0.35 -0.13 0.03; dir: alternate; dur: 800; loop: true; easing: easeInOutQuad">
      </a-plane>

      <a-plane 
        src="#imgPajaro2" 
        position="0.32 -0.35 0.01" 
        height="0.35" width="0.35" 
        material="alphaTest: 0.5; transparent: true"
        animation__respirar="property: scale; to: 1.03 1.03 1; dir: alternate; dur: 1500; loop: true; easing: easeInOutSine">
      </a-plane>

    </a-entity>

  </a-scene>

  <!-- 3. CÓDIGO ANIMADO CON P5.JS -->
  <script>
    let particles = [];

    function setup() {
      // Creamos el lienzo
      let p5Canvas = createCanvas(512, 512);
      p5Canvas.id('p5Canvas');
      
      // Creamos 40 partículas doradas
      for (let i = 0; i < 40; i++) {
        particles.push({
          x: random(width),
          y: random(height),
          size: random(4, 9),
          speedY: random(-1.2, -0.4)
        });
      }
    }

    function draw() {
      clear(); // Fondo transparente
      noStroke();
      fill(255, 230, 120, 200); // Color dorado mágico
      
      // Mueve y dibuja cada partícula
      for (let p of particles) {
        ellipse(p.x, p.y, p.size);
        p.y += p.speedY;
        
        // Al llegar arriba, reaparece abajo
        if (p.y < 0) {
          p.y = height;
          p.x = random(width);
        }
      }
    }
  </script>

</body>
</html>
