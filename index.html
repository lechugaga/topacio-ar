<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>El Topacio - Realidad Aumentada</title>

  <!-- Librerías de A-Frame y MindAR -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
    #indicador {
      position: absolute;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: rgba(18, 38, 25, 0.85);
      color: #ffffff;
      padding: 12px 24px;
      border-radius: 30px;
      font-family: 'Georgia', serif;
      font-size: 14px;
      letter-spacing: 0.5px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      pointer-events: none;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- Mensaje flotante en pantalla -->
  <div id="indicador">🌿 Apunta la cámara a la página de la revista El Topacio</div>

  <!-- Escena AR configurada para rastrear el archivo targets.mind -->
  <a-scene 
    mindar-image="imageTargetSrc: ./targets.mind;" 
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">

    <!-- Declaración de activos -->
    <a-assets>
      <img id="imgColibri" src="./colibri.png">
      <img id="imgOrquidea" src="./orquidea.png">
      <img id="imgPajaro2" src="./pajaro2.png">
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- RASTREADOR: Se activa cuando la cámara reconoce la página de la revista -->
    <a-entity mindar-image-target="targetIndex: 0">

      <!-- 1. ORQUÍDEA FLOTANTE -->
      <a-plane 
        src="#imgOrquidea" 
        position="-0.65 -0.3 0.12" 
        height="0.65" 
        width="0.8" 
        transparent="true"
        animation="property: scale; to: 1.08 1.08 1; dir: alternate; dur: 2200; loop: true; easing: easeInOutSine"
        animation__rot="property: rotation; to: 0 5 2; dir: alternate; dur: 3000; loop: true">
      </a-plane>

      <!-- 2. COLIBRÍ ANIMADO -->
      <a-plane 
        src="#imgColibri" 
        position="-0.38 -0.22 0.25" 
        height="0.5" 
        width="0.75" 
        transparent="true"
        animation__flotar="property: position; to: -0.36 -0.16 0.32; dir: alternate; dur: 800; loop: true; easing: easeInOutQuad"
        animation__inclinacion="property: rotation; to: 4 8 -5; dir: alternate; dur: 1200; loop: true">
      </a-plane>

      <!-- 3. SEGUNDO PAJARITO -->
      <a-plane 
        src="#imgPajaro2" 
        position="0.55 -0.25 0.20" 
        height="0.6" 
        width="0.6" 
        transparent="true"
        animation__respirar="property: scale; to: 1.05 1.05 1; dir: alternate; dur: 1500; loop: true; easing: easeInOutSine"
        animation__balanceo="property: rotation; to: 0 -4 3; dir: alternate; dur: 2000; loop: true">
      </a-plane>

    </a-entity>

  </a-scene>

</body>
</html>
