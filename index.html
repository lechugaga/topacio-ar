<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>El Topacio - WebAR con p5.js Brillo</title>

  <!-- LIBRERÍAS -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    #p5Canvas { display: none; }
    #indicador {
      position: absolute;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: rgba(18, 38, 25, 0.85);
      color: #ffffff;
      padding: 12px 24px;
      border-radius: 30px;
      font-family: 'Georgia', serif;
      font-size: 14px;
      letter-spacing: 0.5px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      pointer-events: none;
      text-align: center;
    }
  </style>

  <script>
    // Componente para forzar la actualización continua del canvas de p5 en AR
    AFRAME.registerComponent('p5-texture', {
      tick: function () {
        let mesh = this.el.getObject3D('mesh');
        if (mesh && mesh.material && mesh.material.map) {
          mesh.material.map.needsUpdate = true;
        }
      }
    });
  </script>
</head>
<body>

  <div id="indicador">🌿 Apunta la cámara a cualquiera de las páginas de la revista</div>

  <a-scene 
    mindar-image="imageTargetSrc: ./targets.mind;" 
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <!-- RECURSOS PNG -->
      <img id="imgColibri" src="./colibri.png">
      <img id="imgOrquidea" src="./orquidea.png">
      <img id="imgPajaro2" src="./pajaro2.png">
      <img id="imgGallito" src="./gallito.png">
      <img id="imgPajaro4" src="./pajaro4.png">
      
      <!-- CANVAS DE P5.JS -->
      <canvas id="p5Canvas"></canvas>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- ================= PÁGINA 2 (targetIndex: 0) ================= -->
    <a-entity mindar-image-target="targetIndex: 0">
      <a-plane 
        src="#imgGallito" 
        position="-0.38 -0.28 0.01" 
        height="0.4" width="0.35" 
        material="alphaTest: 0.5; transparent: true"
        animation__respirar="property: scale; to: 1.07 1.07 1; dir: alternate; dur: 1400; loop: true; easing: easeInOutSine"
        animation__inclinacion="property: rotation; to: 0 0 -4; dir: alternate; dur: 2200; loop: true; easing: easeInOutQuad">
      </a-plane>

      <a-plane 
        src="#imgPajaro4" 
        position="0.38 0.20 0.02" 
        height="0.35" width="0.4" 
        material="alphaTest: 0.5; transparent: true"
        animation__flotar="property: position; to: 0.38 0.23 0.03; dir: alternate; dur: 800; loop: true; easing: easeInOutQuad">
      </a-plane>
    </a-entity>

    <!-- ================= PÁGINA 1 (targetIndex: 1) ================= -->
    <a-entity mindar-image-target="targetIndex: 1">

      <!-- PLANO CON LAS PARTÍCULAS BRILLANTES DE P5.JS (Posicionado ligeramente al frente) -->
      <a-plane 
        src="#p5Canvas" 
        position="0 0 0.04" 
        height="1.2" width="1.6" 
        p5-texture
        material="transparent: true; alphaTest: 0.01; opacity: 1">
      </a-plane>

      <a-plane 
        src="#imgOrquidea" 
        position="-0.65 -0.38 0.01" 
        height="0.4" width="0.5" 
        material="alphaTest: 0.5; transparent: true"
        animation="property: scale; to: 1.03 1.03 1; dir: alternate; dur: 2200; loop: true; easing: easeInOutSine">
      </a-plane>

      <a-plane 
        src="#imgColibri" 
        position="-0.35 -0.15 0.02" 
        height="0.25" width="0.35" 
        material="alphaTest: 0.5; transparent: true"
        animation__flotar="property: position; to: -0.35 -0.13 0.03; dir: alternate; dur: 800; loop: true; easing: easeInOutQuad">
      </a-plane>

      <a-plane 
        src="#imgPajaro2" 
        position="0.32 -0.35 0.01" 
        height="0.35" width="0.35" 
        material="alphaTest: 0.5; transparent: true"
        animation__respirar="property: scale; to: 1.03 1.03 1; dir: alternate; dur: 1500; loop: true; easing: easeInOutSine">
      </a-plane>

    </a-entity>

  </a-scene>

  <!-- SKETCH DE P5.JS CON PARTÍCULAS BRILLANTES Y PARPADEO -->
  <script>
    let particles = [];

    function setup() {
      let p5Canvas = createCanvas(512, 512);
      p5Canvas.id('p5Canvas');
      
      // Creamos 50 lucérnagas/partículas brillantes
      for (let i = 0; i < 50; i++) {
        particles.push({
          x: random(width),
          y: random(height),
          size: random(10, 22),       // Mucho más grandes
          speedY: random(-1.5, -0.4),  // Velocidad hacia arriba
          alpha: random(150, 255),    // Brillo/Transparencia
          alphaSpeed: random(2, 5)     // Velocidad de titilado
        });
      }
    }

    function draw() {
      clear(); // Mantiene el fondo 100% transparente
      
      for (let p of particles) {
        // Efecto de titilado/resplandor
        p.alpha += p.alphaSpeed;
        if (p.alpha > 255 || p.alpha < 100) {
          p.alphaSpeed *= -1;
        }

        // 1. Halo o Resplandor exterior (Luz difusa)
        noStroke();
        fill(255, 240, 150, p.alpha * 0.3);
        ellipse(p.x, p.y, p.size * 1.8);

        // 2. Núcleo brillante e intenso
        fill(255, 255, 200, p.alpha);
        ellipse(p.x, p.y, p.size);

        // Movimiento flotante
        p.y += p.speedY;
        p.x += sin(frameCount * 0.05 + p.y) * 0.5; // Movimiento ondulatorio suave

        // Reaparición abajo
        if (p.y < -20) {
          p.y = height + 20;
          p.x = random(width);
        }
      }
    }
  </script>

</body>
</html>
